<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امشب باهام میای دیت؟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-from: #fff0f8;
    --bg-to: #ffd6ec;
    --card-bg: rgba(255,255,255,0.72);
    --rose: #e8176a;
    --rose-light: #ff6fae;
    --rose-deep: #b5004f;
    --text-main: #3a0020;
    --text-sub: #7a2050;
    --btn-yes-bg: linear-gradient(135deg, #ff6fae, #e8176a);
    --btn-no-bg: linear-gradient(135deg, #ffd6ec, #ffaed3);
    --btn-no-text: #b5004f;
    --font-family: 'Vazirmatn', sans-serif;
    --question-size: 2rem;
    --sub-size: 1.05rem;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(145deg, var(--bg-from) 0%, var(--bg-to) 100%);
    font-family: var(--font-family);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .heart-float {
    position: absolute; opacity: 0; animation: floatUp linear infinite; font-size: 1.2rem; user-select: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-110vh) rotate(20deg) scale(1.1); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative; z-index: 10; background: var(--card-bg);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255,255,255,0.85); border-radius: 2.4rem;
    padding: 3.2rem 3.6rem 2.8rem; max-width: 500px; width: calc(100vw - 2.4rem);
    box-shadow: 0 8px 48px rgba(232,23,106,0.13), 0 2px 8px rgba(232,23,106,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
    text-align: center;
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .card:hover { transform: translateY(-2px); }

  .emoji-top {
    font-size: 3rem; margin-bottom: 0.9rem; animation: pulse 2.2s ease-in-out infinite; display: block;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }

  .question { font-size: var(--question-size); font-weight: 800; color: var(--text-main); line-height: 1.4; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
  .sub-text { font-size: var(--sub-size); color: var(--text-sub); font-weight: 400; margin-bottom: 2.2rem; opacity: 0.75; white-space: pre-line;}

  /* Buttons area */
  .btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; position: relative; }

  .btn-yes, .btn-no-inline {
    border: none; border-radius: 1.2rem; padding: 0.9rem 2.4rem; font-size: 1.15rem; font-weight: 700;
    font-family: var(--font-family); cursor: pointer; position: relative; overflow: hidden; min-width: 120px;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s, background-color 0.3s;
  }
  
  .btn-yes { background: var(--btn-yes-bg); color: #fff; box-shadow: 0 4px 20px rgba(232,23,106,0.28); }
  .btn-yes::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.2s; border-radius: inherit; }
  .btn-yes:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(232,23,106,0.4); }
  .btn-yes:hover::after { background: rgba(255,255,255,0.1); }
  .btn-yes:active { transform: scale(0.97); }

  .btn-no-inline {
    background: var(--btn-no-bg); color: var(--btn-no-text); border: 1.5px solid rgba(232,23,106,0.18);
  }
  .btn-no-inline:hover { transform: scale(0.95); }

  /* Floating No button */
  .btn-no-floating {
    background: var(--btn-no-bg); color: var(--btn-no-text); border: 1.5px solid rgba(232,23,106,0.18);
    border-radius: 1.2rem; padding: 0.9rem 2.4rem; font-size: 1.15rem; font-weight: 600;
    font-family: var(--font-family); cursor: pointer; transition: opacity 0.2s;
    position: fixed; min-width: 120px; z-index: 9999; pointer-events: auto; user-select: none; white-space: nowrap;
  }
  .hidden { display: none !important; }

  /* Animations */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-5px) rotate(-2deg); }
    40%, 80% { transform: translateX(5px) rotate(2deg); }
  }
  .shake { animation: shake 0.4s; }

  .screen { transition: opacity 0.35s ease, transform 0.35s ease; }
  .screen.leaving { opacity: 0; transform: scale(0.93) translateY(-10px); pointer-events: none; }

  .result-emoji { font-size: 3.8rem; display: block; margin-bottom: 0.8rem; }
  .result-title { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
  .result-sub { font-size: 1rem; color: var(--text-sub); opacity: 0.8; line-height: 1.6; white-space: pre-line; }

  /* ─── ADMIN PANEL ─── */
  #admin-overlay {
    display: none; position: fixed; inset: 0; z-index: 99999;
    background: rgba(58,0,32,0.45); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
  }
  #admin-overlay.open { display: flex; }

  #admin-panel {
    background: #fff; border-radius: 1.6rem; padding: 2rem 2.4rem 1.8rem;
    width: min(600px, calc(100vw - 2rem)); max-height: 85vh; overflow-y: auto;
    box-shadow: 0 16px 64px rgba(58,0,32,0.22); font-family: var(--font-family); direction: rtl;
  }
  #admin-panel::-webkit-scrollbar { width: 8px; }
  #admin-panel::-webkit-scrollbar-thumb { background: var(--rose-light); border-radius: 4px; }
  
  #admin-panel h2 { font-size: 1.25rem; font-weight: 800; color: var(--rose-deep); margin-bottom: 0.3rem; }
  #admin-panel .admin-hint { font-size: 0.8rem; color: #aaa; margin-bottom: 1.4rem; }
  
  .admin-section { border-top: 1px solid #f0dde8; padding-top: 1rem; margin-top: 1rem; position: relative;}
  .admin-section h3 { font-size: 0.85rem; font-weight: 700; color: var(--rose); text-transform: uppercase; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center;}
  
  .admin-field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.9rem; }
  .admin-field label { font-size: 0.82rem; color: #888; font-weight: 500; }
  .admin-field input, .admin-field select, .admin-field textarea {
    border: 1.5px solid #f0dde8; border-radius: 0.6rem; padding: 0.5rem 0.75rem;
    font-size: 0.95rem; font-family: var(--font-family); color: var(--text-main);
    outline: none; transition: border-color 0.2s; direction: rtl; resize: vertical;
  }
  .admin-field input:focus, .admin-field select:focus, .admin-field textarea:focus { border-color: var(--rose); }

  .checkbox-field { flex-direction: row; align-items: center; gap: 0.5rem; margin-top: 0.5rem;}
  .checkbox-field input { width: 1.2rem; height: 1.2rem; cursor: pointer; accent-color: var(--rose);}
  .checkbox-field label { cursor: pointer; color: var(--rose-deep); font-weight: 700;}

  .admin-actions { display: flex; gap: 0.7rem; margin-top: 1.4rem; justify-content: flex-end; position: sticky; bottom: -1.8rem; background: #fff; padding-bottom: 1rem; padding-top: 1rem; border-top: 1px solid #f0dde8;}
  .admin-btn { padding: 0.55rem 1.4rem; border-radius: 0.7rem; font-size: 0.92rem; font-weight: 700; font-family: var(--font-family); cursor: pointer; border: none; transition: transform 0.15s; }
  .admin-btn:hover { transform: translateY(-1px); }
  .admin-btn.primary { background: linear-gradient(135deg,#ff6fae,#e8176a); color: #fff; box-shadow: 0 3px 14px rgba(232,23,106,0.3); }
  .admin-btn.secondary { background: #f9eef4; color: var(--rose-deep); border: 1px solid #f0dde8; }
  .admin-btn.danger { background: #ffe5e5; color: #d32f2f; border: 1px solid #ffcccc; padding: 0.3rem 0.8rem; font-size: 0.8rem;}

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5000; }

  @media (max-width: 480px) {
    .card { padding: 2.4rem 1.8rem 2rem; }
    :root { --question-size: 1.55rem; }
  }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>
<canvas id="confetti-canvas"></canvas>

<!-- MAIN CARD -->
<div class="card" id="mainCard">
  <div class="screen" id="stepScreen">
    <span class="emoji-top" id="uiEmoji">🌸</span>
    <div class="question" id="uiTitle">...</div>
    <div class="sub-text" id="uiSub">...</div>
    <div class="btns" id="uiBtns">
      <button class="btn-yes" id="uiBtnYes" onclick="nextStep()">بله</button>
      <button class="btn-no-inline" id="uiBtnNoInline" onclick="handleNormalNo()">نه</button>
    </div>
  </div>
</div>

<!-- Floating NO button -->
<button class="btn-no-floating hidden" id="uiBtnNoFloating">
  <span id="uiBtnNoFloatingText">نه</span>
</button>

<!-- ─── ADMIN PANEL ─── -->
<div id="admin-overlay" onclick="closeAdmin(event)">
  <div id="admin-panel">
    <h2>⚙️ پنل تنظیمات</h2>
    <p class="admin-hint">برای بستن: Escape یا کلیک بیرون پنل &nbsp;|&nbsp; برای باز کردن: Ctrl + Shift + A</p>

    <div id="admin-questions-container">
      <!-- سوالات اینجا توسط جاوااسکریپت ساخته میشن -->
    </div>

    <button class="admin-btn secondary" style="width: 100%; margin-top: 1rem; border: 1.5px dashed var(--rose-light);" onclick="addQuestion()">+ افزودن یک سوال جدید</button>

    <div class="admin-section">
      <h3>🎉 صفحه پایانی (نتیجه)</h3>
      <div class="admin-field"><label>ایموجی</label><input id="a_fEmoji"></div>
      <div class="admin-field"><label>عنوان</label><input id="a_fTitle"></div>
      <div class="admin-field"><label>متن زیرین</label><textarea id="a_fSub" rows="2"></textarea></div>
    </div>

    <div class="admin-section">
      <h3>🎨 ظاهر</h3>
      <div class="admin-field">
        <label>فونت</label>
        <select id="a_font">
          <option value="'Vazirmatn', sans-serif">Vazirmatn (پیش‌فرض)</option>
          <option value="'Lalezar', cursive">Lalezar (بولد)</option>
          <option value="'Rubik', sans-serif">Rubik</option>
          <option value="'Nunito', sans-serif">Nunito</option>
          <option value="'Pacifico', cursive">Pacifico</option>
        </select>
      </div>
      <div style="display:flex; gap:1rem;">
        <div class="admin-field" style="flex:1"><label>پس‌زمینه ۱</label><input type="color" id="a_bgFrom" style="width:100%"></div>
        <div class="admin-field" style="flex:1"><label>پس‌زمینه ۲</label><input type="color" id="a_bgTo" style="width:100%"></div>
        <div class="admin-field" style="flex:1"><label>رنگ اصلی</label><input type="color" id="a_rose" style="width:100%"></div>
      </div>
    </div>

    <div class="admin-actions">
      <button class="admin-btn secondary" onclick="resetDefaults()">بازنشانی پیش‌فرض</button>
      <button class="admin-btn primary" onclick="applyAdmin()">ذخیره و اعمال ✓</button>
    </div>
  </div>
</div>

<script>
// ─── Default Configuration ─────────────────────────────
const DEFAULT_CONFIG = {
  questions: [
    {
      emoji: '🌸', title: 'امشب باهام میای دیت؟', sub: 'یه شب خوب در انتظارمونه ✨',
      yesText: 'آره، حتماً! 💕', noText: 'نه', isEscape: true
    },
    {
      emoji: '🕰️', title: 'ساعت ۸ چطوره؟', sub: 'خودم میام دنبالت 🚗',
      yesText: 'عالیهههه 🎉', noText: 'زوده/دیره', isEscape: false
    }
  ],
  final: {
    emoji: '🥳', title: 'یس! قراره فوق‌العاده باشه!', sub: 'منتظرتم عزیزم 🌹\nامشب بهترین شب عمرمه!'
  },
  design: {
    font: "'Vazirmatn', sans-serif", bgFrom: '#fff0f8', bgTo: '#ffd6ec', rose: '#e8176a'
  }
};

let config = JSON.parse(localStorage.getItem('dateInviteProConfig')) || JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let currentStepIndex = 0;

// ─── Floating hearts ───────────────────────────────────
(function spawnHearts() {
  const bg = document.getElementById('heartsBg');
  const symbols = ['💗','💕','💞','🌸','✨','💖','🌷'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('span');
    el.className = 'heart-float';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (0.9 + Math.random() * 1.1) + 'rem';
    const dur = 9 + Math.random() * 10;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = -(Math.random() * dur) + 's';
    bg.appendChild(el);
  }
})();

// ─── UI Rendering Logic ────────────────────────────────
function initUI() {
  applyDesign(config.design);
  currentStepIndex = 0;
  renderCurrentStep();
}

function renderCurrentStep() {
  const screen = document.getElementById('stepScreen');
  const floatingNoBtn = document.getElementById('uiBtnNoFloating');
  
  // Hide UI temporarily for transition
  screen.classList.add('leaving');
  floatingNoBtn.classList.add('hidden');

  setTimeout(() => {
    // If finished all questions
    if (currentStepIndex >= config.questions.length) {
      document.getElementById('uiEmoji').textContent = config.final.emoji;
      document.getElementById('uiTitle').textContent = config.final.title;
      document.getElementById('uiSub').textContent = config.final.sub;
      document.getElementById('uiBtns').style.display = 'none';
      
      screen.classList.remove('leaving');
      launchConfetti();
      return;
    }

    // Load question data
    const q = config.questions[currentStepIndex];
    document.getElementById('uiEmoji').textContent = q.emoji;
    document.getElementById('uiTitle').textContent = q.title;
    document.getElementById('uiSub').textContent = q.sub;
    document.getElementById('uiBtnYes').textContent = q.yesText;
    document.getElementById('uiBtns').style.display = 'flex';

    const inlineNo = document.getElementById('uiBtnNoInline');
    
    if (q.isEscape) {
      inlineNo.style.display = 'none';
      document.getElementById('uiBtnNoFloatingText').textContent = q.noText;
      // Position it near the Yes button initially
      floatingNoBtn.style.top = ''; floatingNoBtn.style.left = '';
      floatingNoBtn.classList.remove('hidden');
      setTimeout(placeFloatingNo, 50);
    } else {
      inlineNo.style.display = 'inline-block';
      inlineNo.textContent = q.noText;
    }

    screen.classList.remove('leaving');
  }, 350);
}

function nextStep() {
  currentStepIndex++;
  renderCurrentStep();
}

function handleNormalNo() {
  const inlineNo = document.getElementById('uiBtnNoInline');
  const messages = ["مطمئنی؟ 🤨", "دوباره فکر کن 😉", "قبول نیست! 😜", "یه بار دیگه! 🥺"];
  inlineNo.textContent = messages[Math.floor(Math.random() * messages.length)];
  inlineNo.classList.remove('shake');
  void inlineNo.offsetWidth; // trigger reflow
  inlineNo.classList.add('shake');
}

// ─── Floating NO Button Logic ──────────────────────────
const floatingNo = document.getElementById('uiBtnNoFloating');

function placeFloatingNo() {
  const yesBtn = document.getElementById('uiBtnYes');
  if (!yesBtn) return;
  const r = yesBtn.getBoundingClientRect();
  floatingNo.style.transition = 'none';
  floatingNo.style.top  = r.top  + 'px';
  // Put it to the left of Yes button
  floatingNo.style.left = Math.max(20, r.left - 140) + 'px';
  setTimeout(() => { floatingNo.style.transition = 'top 0.28s cubic-bezier(.34,1.56,.64,1), left 0.28s cubic-bezier(.34,1.56,.64,1)'; }, 50);
}

function escapeBtn(x, y) {
  const margin = 30;
  const w = floatingNo.offsetWidth  || 130;
  const h = floatingNo.offsetHeight || 52;
  let nx, ny, tries = 0;
  do {
    nx = margin + Math.random() * (window.innerWidth  - w - margin * 2);
    ny = margin + Math.random() * (window.innerHeight - h - margin * 2);
    tries++;
  } while (Math.hypot(nx + w/2 - x, ny + h/2 - y) < 180 && tries < 30);
  
  floatingNo.style.top  = ny + 'px';
  floatingNo.style.left = nx + 'px';
}

document.addEventListener('mousemove', (e) => {
  if (currentStepIndex >= config.questions.length) return;
  if (!config.questions[currentStepIndex].isEscape) return;
  
  const rect = floatingNo.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  if (Math.hypot(e.clientX - cx, e.clientY - cy) < 90) {
    escapeBtn(e.clientX, e.clientY);
  }
});

document.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  if (!t || currentStepIndex >= config.questions.length) return;
  if (!config.questions[currentStepIndex].isEscape) return;
  
  const rect = floatingNo.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  if (Math.hypot(t.clientX - cx, t.clientY - cy) < 120) {
    escapeBtn(t.clientX, t.clientY);
  }
}, { passive: true });


// ─── ADMIN PANEL ───────────────────────────────────────
function openAdmin() {
  loadAdminValues();
  document.getElementById('admin-overlay').classList.add('open');
}
function closeAdmin(e) {
  if (!e || e.target === document.getElementById('admin-overlay')) {
    document.getElementById('admin-overlay').classList.remove('open');
  }
}
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'a') {
    e.preventDefault();
    const ov = document.getElementById('admin-overlay');
    ov.classList.contains('open') ? closeAdmin() : openAdmin();
  }
  if (e.key === 'Escape') closeAdmin();
});

function loadAdminValues() {
  // Load questions
  renderAdminQuestions();
  
  // Load final screen
  document.getElementById('a_fEmoji').value = config.final.emoji;
  document.getElementById('a_fTitle').value = config.final.title;
  document.getElementById('a_fSub').value = config.final.sub;
  
  // Load design
  document.getElementById('a_font').value = config.design.font;
  document.getElementById('a_bgFrom').value = config.design.bgFrom;
  document.getElementById('a_bgTo').value = config.design.bgTo;
  document.getElementById('a_rose').value = config.design.rose;
}

function renderAdminQuestions() {
  const container = document.getElementById('admin-questions-container');
  container.innerHTML = '';
  config.questions.forEach((q, i) => {
    const section = document.createElement('div');
    section.className = 'admin-section';
    section.innerHTML = `
      <h3>
        <span>مرحله ${i + 1}</span>
        ${config.questions.length > 1 ? `<button class="admin-btn danger" onclick="deleteQuestion(${i})">حذف</button>` : ''}
      </h3>
      <div style="display:flex; gap:1rem;">
        <div class="admin-field" style="width: 80px;"><label>ایموجی</label><input id="aq_emoji_${i}" value="${q.emoji}"></div>
        <div class="admin-field" style="flex:1;"><label>سوال</label><input id="aq_title_${i}" value="${q.title}"></div>
      </div>
      <div class="admin-field"><label>زیرنویس</label><input id="aq_sub_${i}" value="${q.sub}"></div>
      <div style="display:flex; gap:1rem;">
        <div class="admin-field" style="flex:1;"><label>دکمه بله</label><input id="aq_yes_${i}" value="${q.yesText}"></div>
        <div class="admin-field" style="flex:1;"><label>دکمه نه</label><input id="aq_no_${i}" value="${q.noText}"></div>
      </div>
      <div class="admin-field checkbox-field">
        <input type="checkbox" id="aq_escape_${i}" ${q.isEscape ? 'checked' : ''}>
        <label for="aq_escape_${i}">دکمه «نه» فراری باشد (کاربر نتواند کلیک کند)</label>
      </div>
    `;
    container.appendChild(section);
  });
}

function addQuestion() {
  config.questions.push({
    emoji: '❓', title: 'سوال جدید؟', sub: 'توضیحات...',
    yesText: 'بله', noText: 'خیر', isEscape: true
  });
  renderAdminQuestions();
}

function deleteQuestion(index) {
  if (config.questions.length > 1) {
    config.questions.splice(index, 1);
    renderAdminQuestions();
  }
}

function applyAdmin() {
  // Save questions
  config.questions.forEach((q, i) => {
    q.emoji = document.getElementById(`aq_emoji_${i}`).value;
    q.title = document.getElementById(`aq_title_${i}`).value;
    q.sub = document.getElementById(`aq_sub_${i}`).value;
    q.yesText = document.getElementById(`aq_yes_${i}`).value;
    q.noText = document.getElementById(`aq_no_${i}`).value;
    q.isEscape = document.getElementById(`aq_escape_${i}`).checked;
  });

  // Save final screen
  config.final.emoji = document.getElementById('a_fEmoji').value;
  config.final.title = document.getElementById('a_fTitle').value;
  config.final.sub = document.getElementById('a_fSub').value;

  // Save design
  config.design.font = document.getElementById('a_font').value;
  config.design.bgFrom = document.getElementById('a_bgFrom').value;
  config.design.bgTo = document.getElementById('a_bgTo').value;
  config.design.rose = document.getElementById('a_rose').value;

  localStorage.setItem('dateInviteProConfig', JSON.stringify(config));
  closeAdmin();
  initUI(); // Restart to apply
}

function resetDefaults() {
  if(confirm('مطمئنی می‌خوای به حالت اول برگرده؟')) {
    localStorage.removeItem('dateInviteProConfig');
    config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    applyAdmin(); // Saves the default and restarts
  }
}

// ─── Design Handlers ───────────────────────────────────
function applyDesign(d) {
  const root = document.documentElement.style;
  root.setProperty('--font-family', d.font);
  root.setProperty('--bg-from', d.bgFrom);
  root.setProperty('--bg-to', d.bgTo);
  root.setProperty('--rose', d.rose);
  root.setProperty('--btn-yes-bg', `linear-gradient(135deg, ${lighten(d.rose,0.2)}, ${d.rose})`);
  root.setProperty('--btn-no-text', darken(d.rose, 0.2));

  if (d.font.includes('Lalezar')) loadGFont('Lalezar');
  if (d.font.includes('Rubik'))   loadGFont('Rubik:wght@400;700');
  if (d.font.includes('Nunito'))  loadGFont('Nunito:wght@400;700;800');
  if (d.font.includes('Pacifico')) loadGFont('Pacifico');
}

function loadGFont(name) {
  const id = 'gfont-' + name.split(':')[0].toLowerCase();
  if (document.getElementById(id)) return;
  const l = document.createElement('link'); l.id = id; l.rel = 'stylesheet';
  l.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(name) + '&display=swap';
  document.head.appendChild(l);
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [232,23,106];
}
function rgbToHex(r,g,b) { return '#' + [r,g,b].map(v => Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0')).join(''); }
function lighten(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r + Math.round((255-r)*amt), g + Math.round((255-g)*amt), b + Math.round((255-b)*amt));
}
function darken(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(Math.round(r*(1-amt)), Math.round(g*(1-amt)), Math.round(b*(1-amt)));
}

// ─── Confetti ──────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#ff6fae','#e8176a','#ffb3d4','#ffd6ec','#ff4d8c','#fff','#b5004f'];
  for (let i = 0; i < 140; i++) {
    pieces.push({
      x: Math.random() * canvas.width, y: -10 - Math.random() * 200,
      w: 5 + Math.random() * 9, h: 3 + Math.random() * 5,
      r: Math.random() * Math.PI * 2, dr: (Math.random() - 0.5) * 0.2,
      vx: (Math.random() - 0.5) * 3, vy: 2.5 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)], opacity: 1,
    });
  }
  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      if (p.y < canvas.height + 20) {
        alive = true;
        p.x += p.vx; p.y += p.vy; p.r += p.dr; p.vy += 0.06;
        if (p.y > canvas.height * 0.7) p.opacity -= 0.012;
        ctx.save(); ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x, p.y); ctx.rotate(p.r);
        ctx.fillStyle = p.color; ctx.beginPath();
        ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 2); ctx.fill();
        ctx.restore();
      }
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}
